name: CI-CD Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  APP_NAME: softy-be
  DEPLOY_PATH: /home/ubuntu/softy/deploy/
  LOG_PATH: /home/ubuntu/softy/logs/

jobs:
  test:
    name: 1) test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run tests
        run: ./gradlew test --no-daemon

  build_and_push:
    name: 2) build and push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/softy-be" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: 3) deploy to server
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
          TAG: latest
          APP_NAME: ${{ env.APP_NAME }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          LOG_PATH: ${{ env.LOG_PATH }}
          APP_PORT: '8080'
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: softy2.duckdns.org
          username: ubuntu
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,TAG,APP_NAME,DEPLOY_PATH,LOG_PATH,APP_PORT,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            mkdir -p "$DEPLOY_PATH"
            mkdir -p "$LOG_PATH"

            if [ ! -f /home/ubuntu/softy/.env ]; then
              echo "Missing /home/ubuntu/softy/.env"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE:$TAG"

            docker rm -f "$APP_NAME" || true

            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              --env-file /home/ubuntu/softy/.env \
              -e LOG_PATH=/app/logs \
              -p "$APP_PORT:8080" \
              -v "$LOG_PATH:/app/logs" \
              "$IMAGE:$TAG"

            for i in {1..20}; do
              if curl -fsS "http://127.0.0.1:8080/health" >/dev/null; then
                echo "Deploy success"
                exit 0
              fi
              sleep 3
            done

            echo "Deploy failed: health check did not pass"
            docker logs --tail 200 "$APP_NAME" || true
            exit 1
