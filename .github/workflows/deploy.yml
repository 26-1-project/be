name: CI-CD Deploy (Blue-Green)

on:
  push:
    branches:
      - main
      - feature/deploy-ghcr-actions
  workflow_dispatch:

env:
  APP_NAME: softy-be
  DEPLOY_PATH: /home/ubuntu/softy/deploy/
  LOG_PATH: /home/ubuntu/softy/logs/

jobs:
  test:
    name: 1) test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  build_and_push:
    name: 2) build and push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/softy-be" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tag
        id: tag
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }}

  deploy:
    name: 3) blue-green deploy to server
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy via SSH (Blue-Green)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
          TAG: ${{ needs.build_and_push.outputs.tag }}
          APP_NAME: ${{ env.APP_NAME }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          LOG_PATH: ${{ env.LOG_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: softy2.duckdns.org
          username: ubuntu
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,TAG,APP_NAME,DEPLOY_PATH,LOG_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            NGINX_CONF=/etc/nginx/sites-enabled/default
            mkdir -p "$DEPLOY_PATH"
            mkdir -p "$LOG_PATH"

            if [ ! -f /home/ubuntu/softy/.env ]; then
              echo "Missing /home/ubuntu/softy/.env"
              exit 1
            fi

            ACTIVE_PORT=$(grep -Eo 'set \$upstream_app http://127\.0\.0\.1:(8081|8082);' "$NGINX_CONF" | grep -Eo '(8081|8082)' | head -n1 || true)
            if [ "$ACTIVE_PORT" = "8081" ]; then
              TARGET_PORT=8082
              TARGET_SLOT=green
              OLD_SLOT=blue
            elif [ "$ACTIVE_PORT" = "8082" ]; then
              TARGET_PORT=8081
              TARGET_SLOT=blue
              OLD_SLOT=green
            else
              echo "Active slot not found. Defaulting to blue(8081) active, green(8082) target."
              TARGET_PORT=8082
              TARGET_SLOT=green
              OLD_SLOT=blue
            fi

            TARGET_CONTAINER="${APP_NAME}-${TARGET_SLOT}"
            OLD_CONTAINER="${APP_NAME}-${OLD_SLOT}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE:$TAG"

            docker rm -f "$TARGET_CONTAINER" || true

            docker run -d \
              --name "$TARGET_CONTAINER" \
              --restart unless-stopped \
              --env-file /home/ubuntu/softy/.env \
              -e LOG_PATH=/app/logs \
              -p "$TARGET_PORT:8080" \
              -v "$LOG_PATH:/app/logs" \
              "$IMAGE:$TAG"

            for i in {1..20}; do
              if curl -fsS "http://127.0.0.1:${TARGET_PORT}/health" >/dev/null; then
                echo "New slot health check success"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "New slot health check failed"
                docker logs --tail 200 "$TARGET_CONTAINER" || true
                exit 1
              fi
              sleep 3
            done

            sudo sed -i -E "s#set \\\$upstream_app http://127.0.0.1:(8081|8082);#set \\\$upstream_app http://127.0.0.1:${TARGET_PORT};#g" "$NGINX_CONF"
            sudo nginx -t
            sudo systemctl reload nginx

            for i in {1..10}; do
              if curl -fsS "https://softy2.duckdns.org/health" >/dev/null; then
                echo "Post-switch health check success"
                docker rm -f "$OLD_CONTAINER" || true
                echo "Blue-green deploy success: switched to ${TARGET_SLOT}(${TARGET_PORT})"
                exit 0
              fi
              sleep 2
            done

            echo "Post-switch health check failed. Rolling back to ${ACTIVE_PORT}."
            sudo sed -i -E "s#set \\\$upstream_app http://127.0.0.1:(8081|8082);#set \\\$upstream_app http://127.0.0.1:${ACTIVE_PORT};#g" "$NGINX_CONF"
            sudo nginx -t
            sudo systemctl reload nginx
            docker rm -f "$TARGET_CONTAINER" || true
            exit 1
