spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Seoul

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  file:
    path: ${LOG_PATH:/app/logs}
    name: ${LOG_PATH:/app/logs}/application.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_PATH:/app/logs}/application.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 3GB
