spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Seoul

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    auth-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me

jwt:
  secret: ${JWT_SECRET}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:1209600}

admin:
  provision-key: ${ADMIN_PROVISION_KEY}

app:
  frontend-redirect-uri: ${APP_FRONTEND_REDIRECT_URI:}

swagger:
  server-url: ${SWAGGER_SERVER_URL:}
  local-server-url: ${SWAGGER_LOCAL_SERVER_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  file:
    path: ${LOG_PATH:/app/logs}
    name: ${LOG_PATH:/app/logs}/application.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_PATH:/app/logs}/application.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 3GB
